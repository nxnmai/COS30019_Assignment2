[paths]
raw_scats_xls = data/raw/Scats Data October 2006.xls
clean_scats_csv = data/processed/scats_oct2006_clean.csv
scaler_path = data/processed/scaler.pkl
dataset_npz = data/processed/datasets.npz
dataset_metadata = data/processed/dataset_metadata.json
graph_edges_csv = data/processed/graph_edges.csv
evaluation_dir = data/processed/evaluation
checkpoints_dir = data/processed/checkpoints

[preprocessing]
lookback = 12
train_days = 21
val_days = 5
test_days = 5
min_available_days = 21

[models]
default_model = transformer
transformer_checkpoint = data/processed/checkpoints/transformer.pt
lstm_checkpoint = data/processed/checkpoints/lstm.pt
gru_checkpoint = data/processed/checkpoints/gru.pt

[training]
epochs = 100
batch_size = 128
learning_rate = 0.001
weight_decay = 0.00001
patience = 12
min_delta = 0.00001

[travel_time]
free_flow_threshold = 351
speed_limit_kmh = 60
min_speed_kmh = 5
intersection_delay_sec = 30

[routing]
default_k = 5
max_path_depth = 14
undirected = false

[inference]
device = auto
